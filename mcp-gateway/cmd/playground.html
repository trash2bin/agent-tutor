<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCP Playground — developer tools</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #e0e0e0;
    --text-dim: #888;
    --green: #2ecc71;
    --orange: #f39c12;
    --red: #e74c3c;
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid var(--accent);
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { color: var(--text-dim); font-size: 13px; margin-left: auto; }
  .header .badge {
    background: var(--accent2);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }
  .tenant-select {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--surface2);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-width: 160px;
  }
  .tenant-select:focus { outline: none; border-color: var(--accent); }
.tenant-badge {
  margin-left: 8px;
  font-size: 12px;
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
}

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--surface2);
    margin-bottom: 20px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Tool cards */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 12px;
  }
  .tool-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: all .15s;
  }
  .tool-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .tool-card .name {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .tool-card .desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .tool-card .params {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* Tool detail panel */
  .tool-detail {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .tool-detail h2 { font-size: 18px; margin-bottom: 12px; }
  .tool-detail .desc { color: var(--text-dim); margin-bottom: 16px; }
  .param-row { margin-bottom: 12px; }
  .param-row label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .param-row label .req { color: var(--accent); margin-left: 4px; }
  .param-row label .type {
    color: var(--text-dim);
    font-weight: 400;
    margin-left: 8px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .param-row input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--surface2);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
  }
  .param-row input:focus { outline: none; border-color: var(--accent); }

  /* Buttons */
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--accent2); }

  /* Result */
  .result-box {
    background: #0d0d1a;
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 13px;
    white-space: pre-wrap;
    max-height: 400px;
    overflow: auto;
    line-height: 1.5;
  }
  .result-box .key { color: #e879f9; }
  .result-box .string { color: #a5d6ff; }
  .result-box .number { color: #7dd3fc; }
  .result-box .bool { color: #fbbf24; }
  .result-box .null { color: #6b7280; }

  /* Raw MCP tester */
  .raw-field {
    width: 100%;
    min-height: 200px;
    background: #0d0d1a;
    border: 1px solid var(--surface2);
    border-radius: 8px;
    padding: 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    resize: vertical;
  }
  .raw-field:focus { outline: none; border-color: var(--accent); }

  /* Sessions table */
  .sessions-table {
    width: 100%;
    border-collapse: collapse;
  }
  .sessions-table th, .sessions-table td {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--surface2);
    font-size: 13px;
    font-family: var(--mono);
  }
  .sessions-table th { color: var(--text-dim); font-weight: 500; font-size: 12px; text-transform: uppercase; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Loading */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status indicators */
  .status-ok { color: var(--green); }
  .status-err { color: var(--red); }
</style>
</head>
<body>
<div class="header">
  <h1>🔧 MCP Playground</h1>
  <span class="badge">dev mode</span>
  <div style="display: flex; align-items: center; gap: 8px;">
    <input type="text" id="tenantId" class="tenant-select" placeholder="X-Tenant-ID"
           title="Enter a tenant ID to set the X-Tenant-ID header on every request" />
    <button id="applyTenant" class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;">Apply</button>
  </div>
  <span class="subtitle" id="serverInfo">connecting...</span>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="tools">🧰 Tools</button>
    <button class="tab-btn" data-tab="raw">📡 Raw MCP</button>
    <button class="tab-btn" data-tab="sessions">🔌 Sessions</button>
    <button class="tab-btn" data-tab="config">⚙️ Config</button>
  </div>

  <!-- Tab: Tools -->
  <div class="tab-content active" id="tab-tools">
    <div style="margin-bottom:16px; display:flex; gap:8px; align-items:center;">
      <span id="toolCount" style="font-size:14px; color:var(--text-dim);"></span>
      <span id="toolStatus" style="font-size:13px;"></span>
    </div>

    <div id="toolDetail" class="tool-detail" style="display:none;"></div>

    <div id="toolGrid" class="tool-grid">
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>Loading tools...</p>
      </div>
    </div>
  </div>

  <!-- Tab: Raw MCP -->
  <div class="tab-content" id="tab-raw">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; min-height:60vh;">
      <div>
        <div style="margin-bottom:8px; display:flex; gap:8px; align-items:center;">
          <span style="font-size:14px; font-weight:600;">JSON-RPC Request</span>
          <span style="font-size:11px; color:var(--text-dim);">POST /mcp/message</span>
        </div>
        <textarea id="rawRequest" class="raw-field">{
  "jsonrpc": "2.0",
  "id": "1",
  "method": "tools/list",
  "params": {}
}</textarea>
        <div style="margin-top:8px; display:flex; gap:8px;">
          <button class="btn btn-primary" id="rawSend">▶ Send</button>
          <button class="btn btn-secondary" id="rawClear">Clear</button>
        </div>
      </div>
      <div>
        <div style="margin-bottom:8px; display:flex; gap:8px; align-items:center;">
          <span style="font-size:14px; font-weight:600;">Response</span>
          <span id="rawStatus" style="font-size:12px; color:var(--text-dim);"></span>
        </div>
        <pre id="rawResult" class="raw-field" style="min-height:200px; white-space:pre-wrap;">Response will appear here...</pre>
      </div>
    </div>
  </div>

  <!-- Tab: Sessions -->
  <div class="tab-content" id="tab-sessions">
    <div style="margin-bottom:12px; display:flex; gap:8px; align-items:center;">
      <button class="btn btn-secondary" id="refreshSessions">🔄 Refresh</button>
      <span id="sessionCount" style="font-size:13px; color:var(--text-dim);"></span>
    </div>
    <div id="sessionsContent">
      <div class="empty-state">
        <div class="icon">🔌</div>
        <p>No active SSE sessions</p>
      </div>
    </div>
  </div>

  <!-- Tab: Config -->
  <div class="tab-content" id="tab-config">
    <div id="configContent">
      <div class="empty-state">
        <div class="icon">⚙️</div>
        <p>Loading config...</p>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = location.origin;
const TID = document.getElementById('tenantId');
const TENANT_QUERY_KEYS = ['tenant', 'tenat'];
const qs = new URLSearchParams(location.search);
const tenantStorageKey = 'mcpGatewayDebugTenantId';
const storage = window.localStorage;

function escapeHtml(value) {
  const div = document.createElement('div');
  div.textContent = String(value ?? '');
  return div.innerHTML;
}

function syntaxHighlight(value) {
  if (typeof value === 'string') {
    try {
      value = JSON.parse(value);
    } catch (_) {
      return escapeHtml(value);
    }
  }
  return escapeHtml(JSON.stringify(value, null, 2));
}

const queryTenant =
  TENANT_QUERY_KEYS.map((key) => qs.get(key)).find((value) => value && value.trim()) || '';
function readStoredTenant() {
  try {
    return storage.getItem(tenantStorageKey) || '';
  } catch (_) {
    return '';
  }
}

function writeStoredTenant(value) {
  try {
    if (value) {
      storage.setItem(tenantStorageKey, value);
    } else {
      storage.removeItem(tenantStorageKey);
    }
  } catch (_) {}
}

const initialTenant = queryTenant.trim() || readStoredTenant() || 'default';
TID.value = initialTenant;

function getTenantId() {
  return TID.value.trim();
}

function tenantHeaders(extra = {}) {
  const headers = { 'Content-Type': 'application/json', ...extra };
  const tenantId = getTenantId();
  if (tenantId) {
    headers['X-Tenant-ID'] = tenantId;
  }
  return headers;
}

function updateServerInfo(baseMarkup) {
  const infoEl = document.getElementById('serverInfo');
  const tenantVal = getTenantId();
  infoEl.innerHTML = tenantVal
    ? `${baseMarkup} <span class="tenant-badge">[tenant: ${escapeHtml(tenantVal)}]</span>`
    : baseMarkup;
}

document.querySelectorAll('.tab-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
  });
});

async function getJson(url) {
  const response = await fetch(url, { headers: tenantHeaders() });
  if (!response.ok) {
    throw new Error(`HTTP ${response.status}`);
  }
  return response.json();
}

async function postJson(url, body) {
  const response = await fetch(url, {
    method: 'POST',
    headers: tenantHeaders(),
    body: JSON.stringify(body),
  });
  const text = await response.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch (_) {
    data = text;
  }
  return { status: response.status, data };
}

async function loadTools() {
  const grid = document.getElementById('toolGrid');
  const count = document.getElementById('toolCount');
  const status = document.getElementById('toolStatus');

  try {
    const res = await postJson(`${BASE}/mcp/message`, {
      jsonrpc: '2.0',
      id: 'tools-list',
      method: 'tools/list',
      params: {},
    });

    const tools = res.data?.result?.tools || [];
    if (!Array.isArray(tools) || tools.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">😕</div><p>No tools registered for this tenant</p></div>';
      count.textContent = '0 tools';
      status.innerHTML = '<span class="status-err">✗ no tools</span>';
      window._toolMap = {};
      return;
    }

    const toolMap = {};
    grid.innerHTML = tools.map((tool) => {
      const props = tool.inputSchema?.properties || {};
      const required = tool.inputSchema?.required || [];
      const propNames = Object.keys(props).length
        ? Object.entries(props).map(([key, schema]) => {
            const type = schema?.type || 'any';
            const reqMark = required.includes(key) ? '<span style="color:var(--accent)">*</span>' : '';
            return `${escapeHtml(key)}: ${escapeHtml(type)}${reqMark}`;
          }).join(', ')
        : 'no params';

      toolMap[tool.name] = { tool, params: props, required };
      return `
        <div class="tool-card" data-tool="${escapeHtml(tool.name)}">
          <div class="name">${escapeHtml(tool.name)}</div>
          <div class="desc">${escapeHtml(tool.description || '—')}</div>
          <div class="params">${propNames}</div>
        </div>
      `;
    }).join('');

    window._toolMap = toolMap;
    count.textContent = `${tools.length} tools`;
    status.innerHTML = '<span class="status-ok">✓ loaded</span>';

    grid.querySelectorAll('.tool-card').forEach((card) => {
      card.addEventListener('click', () => showToolDetail(card.dataset.tool));
    });
  } catch (error) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${escapeHtml(error.message)}</p></div>`;
    count.textContent = '—';
    status.innerHTML = `<span class="status-err">✗ ${escapeHtml(error.message)}</span>`;
  }
}

function showToolDetail(name) {
  const entry = (window._toolMap || {})[name];
  if (!entry) return;

  const { tool, params, required } = entry;
  const detail = document.getElementById('toolDetail');
  detail.style.display = 'block';

  const paramFields = Object.entries(params).map(([key, schema]) => {
    const isRequired = required.includes(key);
    const placeholder = schema?.description || schema?.type || 'any';
    return `
      <div class="param-row">
        <label>
          ${escapeHtml(key)}
          ${isRequired ? '<span class="req">*</span>' : ''}
          <span class="type">${escapeHtml(schema?.type || 'any')}</span>
        </label>
        <input type="text" id="param-${escapeHtml(key)}" placeholder="${escapeHtml(placeholder)}" ${isRequired ? 'required' : ''}>
      </div>
    `;
  }).join('');

  detail.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
      <div>
        <h2><span style="font-family:var(--mono);">${escapeHtml(name)}</span></h2>
        <div class="desc">${escapeHtml(tool.description || '—')}</div>
      </div>
      <button class="btn btn-secondary" id="closeToolDetail" style="font-size:18px;">✕</button>
    </div>
    ${paramFields}
    <div style="margin-top:16px; display:flex; gap:8px; align-items:center;">
      <button class="btn btn-primary" id="callBtn">▶ Call Tool</button>
      <span id="callStatus" style="font-size:13px;"></span>
    </div>
    <div id="toolResult" class="result-box" style="display:none;"></div>
  `;

  document.getElementById('closeToolDetail').addEventListener('click', () => {
    detail.style.display = 'none';
  });
  document.getElementById('callBtn').addEventListener('click', () => callTool(name));
  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function callTool(name) {
  const entry = (window._toolMap || {})[name];
  if (!entry) return;

  const btn = document.getElementById('callBtn');
  const status = document.getElementById('callStatus');
  const result = document.getElementById('toolResult');

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> calling...';
  result.style.display = 'none';

  const args = {};
  for (const key of Object.keys(entry.params)) {
    const el = document.getElementById(`param-${key}`);
    if (el && el.value) {
      args[key] = el.value;
    }
  }

  try {
    const { status: httpStatus, data } = await postJson(`${BASE}/mcp/message`, {
      jsonrpc: '2.0',
      id: `call-${name}`,
      method: 'tools/call',
      params: { name, arguments: args },
    });

    result.style.display = 'block';
    if (httpStatus === 200) {
      const text = data?.result?.content?.[0]?.text || JSON.stringify(data?.result || data, null, 2);
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (_) {
        parsed = text;
      }
      result.innerHTML = syntaxHighlight(parsed);
      status.innerHTML = '<span class="status-ok">✓ OK</span>';
    } else {
      result.innerHTML = syntaxHighlight(data);
      status.innerHTML = `<span class="status-err">✗ ${httpStatus}</span>`;
    }
  } catch (error) {
    result.style.display = 'block';
    result.innerHTML = `<span style="color:var(--red)">Error: ${escapeHtml(error.message)}</span>`;
    status.innerHTML = `<span class="status-err">✗ ${escapeHtml(error.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('rawSend').addEventListener('click', async () => {
  const textarea = document.getElementById('rawRequest');
  const result = document.getElementById('rawResult');
  const status = document.getElementById('rawStatus');
  const btn = document.getElementById('rawSend');

  let body;
  try {
    body = JSON.parse(textarea.value);
  } catch (error) {
    result.innerHTML = `<span style="color:var(--red)">Invalid JSON: ${escapeHtml(error.message)}</span>`;
    return;
  }

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> waiting...';
  result.innerHTML = 'Sending...';

  try {
    const { status: httpStatus, data } = await postJson(`${BASE}/mcp/message`, body);
    result.innerHTML = syntaxHighlight(data);
    status.innerHTML = `HTTP ${httpStatus} ${data?.result ? '<span class="status-ok">✓ result</span>' : ''} ${data?.error ? `<span class="status-err">✗ ${escapeHtml(data.error.message)}</span>` : ''}`;
  } catch (error) {
    result.innerHTML = `<span style="color:var(--red)">Error: ${escapeHtml(error.message)}</span>`;
    status.innerHTML = `<span class="status-err">✗ ${escapeHtml(error.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('rawClear').addEventListener('click', () => {
  document.getElementById('rawRequest').value = `{
  "jsonrpc": "2.0",
  "id": "1",
  "method": "tools/list",
  "params": {}
}`;
  document.getElementById('rawResult').textContent = 'Response will appear here...';
  document.getElementById('rawStatus').textContent = '';
});

async function loadSessions() {
  const content = document.getElementById('sessionsContent');
  const count = document.getElementById('sessionCount');

  try {
    const data = await getJson(`${BASE}/debug/sessions`);
    const sessions = data.sessions || [];
    count.textContent = `${sessions.length} active session(s)`;

    if (sessions.length === 0) {
      content.innerHTML = '<div class="empty-state"><div class="icon">🔌</div><p>No active SSE sessions</p></div>';
      return;
    }

    const rows = sessions.map((session, index) => `
      <tr>
        <td>${index + 1}</td>
        <td style="font-family:var(--mono);font-size:12px;">${escapeHtml(session.session_id || '—')}</td>
        <td>${escapeHtml(session.tenant_id || '—')}</td>
      </tr>
    `).join('');

    content.innerHTML = `
      <table class="sessions-table">
        <thead><tr><th>#</th><th>Session ID</th><th>Tenant</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (error) {
    content.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${escapeHtml(error.message)}</p></div>`;
  }
}

document.getElementById('refreshSessions').addEventListener('click', loadSessions);

async function loadConfig() {
  const content = document.getElementById('configContent');
  try {
    const data = await getJson(`${BASE}/debug/config`);
    content.innerHTML = `<div class="result-box">${syntaxHighlight(data)}</div>`;
  } catch (error) {
    content.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${escapeHtml(error.message)}</p></div>`;
  }
}

let reloadTimer;
let serverInfoBase = `connected · ${escapeHtml(location.host)}`;

function refreshServerInfo() {
  updateServerInfo(serverInfoBase);
}

function applyTenant() {
  writeStoredTenant(getTenantId());
  refreshServerInfo();
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(() => {
    loadTools();
    loadConfig();
  }, 250);
}

TID.addEventListener('input', () => {
  refreshServerInfo();
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(() => {
    loadTools();
    loadConfig();
  }, 250);
});

TID.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    event.preventDefault();
    applyTenant();
  }
});

document.getElementById('applyTenant').addEventListener('click', applyTenant);

async function init() {
  refreshServerInfo();
  try {
    await getJson(`${BASE}/health`);
    serverInfoBase = `<span class="status-ok">✓ connected</span> · ${escapeHtml(location.host)}`;
  } catch (error) {
    serverInfoBase = `<span class="status-err">✗ ${escapeHtml(error.message)}</span>`;
  }

  refreshServerInfo();
  loadTools();
  loadSessions();
  loadConfig();
}

init();
</script>
</body>
</html>
