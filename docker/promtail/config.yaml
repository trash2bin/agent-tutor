# Promtail configuration for Helperium log collection
# Scrapes Docker container logs + native service log files
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_network_name]
        regex: .*helperium-net.*
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: ^/(.+)
        replacement: $1
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_compose_project]
        target_label: compose_project
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
      - json:
          source: log
          expressions:
            level: level
            logger: logger
            msg: msg
            timestamp: timestamp
            correlation_id: correlation_id
            error: error
            tenant: tenant.id
            traceID: trace_id

  - job_name: native-services
    static_configs:
      - targets: [localhost]
        labels:
          job: native-services
          __path__: /var/log/helperium/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: name
            msg: msg
            message: message
            timestamp: time
            traceID: trace_id
            correlation_id: correlation_id
            tenant: tenant.id
            error: error
            path: path
            method: method
            status: status
      - regex:
          expression: ^(?P<level>\w+):\s+(?P<message>.*)$
