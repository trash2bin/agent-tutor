openapi: 3.1.0
info:
  title: RAG Service
  description: HTTP API for RAG pipeline (indexing and semantic search)
  version: 1.1.0
paths:
  /health:
    get:
      summary: Проверка состояния сервиса
      description: Проверяет доступность SQLite, ChromaDB и загрузку embedding-модели.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /documents/list:
    post:
      summary: Список документов
      description: Возвращает список документов в индексе с фильтрацией по дисциплине.
      operationId: list_documents_documents_list_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListDocumentsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/import:
    post:
      summary: Импорт документа
      description: Загружает файл в RAG-индекс, разбивает на чанки и индексирует векторы.
      operationId: import_document_documents_import_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportDocumentRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/upload:
    post:
      summary: Загрузка файла и импорт
      description: Принимает multipart-файл, сохраняет во временную директорию и импортирует
        в RAG-индекс.
      operationId: upload_document_documents_upload_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_document_documents_upload_post'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /documents/delete:
    post:
      summary: Удаление документа
      description: Удаляет документ и его векторы из индекса по пути или ID. Идемпотентно.
      operationId: delete_document_documents_delete_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteDocumentRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /search:
    post:
      summary: Семантический поиск
      description: Ищет наиболее релевантные фрагменты документов по текстовому запросу.
      operationId: search_search_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /context:
    post:
      summary: Сборка контекста
      description: Формирует итоговую строку контекста для передачи в LLM.
      operationId: context_context_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/config:
    get:
      summary: Получить RAG-конфиг
      description: Возвращает текущую конфигурацию RAG (embedding_api_key маскирован).
      operationId: admin_get_config_admin_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConfigResponse'
    put:
      summary: Обновить RAG-конфиг
      description: Применяет новые параметры конфигурации RAG. После обновления сбрасывает
        pipeline — новый pipeline создастся при следующем вызове get_pipeline() с
        обновлённым конфигом. embedding_api_key не принимается (читается только из
        env).
      operationId: admin_put_config_admin_config_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminConfigUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /admin/stats:
    get:
      summary: Статистика RAG
      description: Возвращает количество документов, чанков и размер ChromaDB.
      operationId: admin_get_stats_admin_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatsResponse'
components:
  schemas:
    AdminConfigResponse:
      properties:
        embedding_provider:
          type: string
          title: Embedding Provider
          description: 'Провайдер эмбеддингов: local | litellm'
          default: local
        embedding_model:
          type: string
          title: Embedding Model
          description: Модель эмбеддингов
          default: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
        embedding_batch_size:
          type: integer
          title: Embedding Batch Size
          description: Размер батча эмбеддингов
          default: 64
        embedding_device:
          type: string
          title: Embedding Device
          description: 'Устройство: cpu | cuda'
          default: cpu
        embedding_local_files_only:
          type: boolean
          title: Embedding Local Files Only
          description: Только локальные файлы модели
          default: false
        embedding_query_prefix:
          type: string
          title: Embedding Query Prefix
          description: Префикс для query
          default: ''
        embedding_passage_prefix:
          type: string
          title: Embedding Passage Prefix
          description: Префикс для passage
          default: ''
        embedding_api_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Api Key
          description: API-ключ эмбеддингов (маскирован)
        embedding_api_base:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Api Base
          description: Базовый URL API эмбеддингов
        embedding_dimensions:
          type: integer
          title: Embedding Dimensions
          description: Размерность вектора для API-провайдеров
          default: 1536
        chunker_type:
          type: string
          title: Chunker Type
          description: Тип чанкера
          default: semantic
        chunk_size:
          type: integer
          title: Chunk Size
          description: Размер чанка (токенов)
          default: 768
        chunk_overlap:
          type: integer
          title: Chunk Overlap
          description: Перекрытие чанков
          default: 160
        page_overlap_tokens:
          type: integer
          title: Page Overlap Tokens
          description: Перекрытие между страницами
          default: 50
        chroma_path:
          type: string
          title: Chroma Path
          description: Путь к ChromaDB
          default: ''
        chroma_collection:
          type: string
          title: Chroma Collection
          description: Коллекция ChromaDB
          default: university_documents
        rag_db_path:
          type: string
          title: Rag Db Path
          description: Путь к SQLite RAG
          default: ''
        rag_instruction:
          type: string
          title: Rag Instruction
          description: Инструкция для LLM о том, как использовать RAG-контекст
          default: Ответь на вопрос только по найденным фрагментам документов.
        reranker_enabled:
          type: boolean
          title: Reranker Enabled
          description: BM25 reranker включён
          default: true
        reranker_k1:
          type: number
          title: Reranker K1
          description: Параметр K1 BM25
          default: 1.5
        reranker_b:
          type: number
          title: Reranker B
          description: Параметр B BM25
          default: 0.75
        reranker_dense_factor:
          type: integer
          title: Reranker Dense Factor
          description: Множитель dense-кандидатов перед BM25
          default: 3
        cache_enabled:
          type: boolean
          title: Cache Enabled
          description: Кэш поиска включён
          default: true
        cache_maxsize:
          type: integer
          title: Cache Maxsize
          description: Максимальный размер кэша
          default: 256
        cache_ttl:
          type: integer
          title: Cache Ttl
          description: TTL кэша в секундах
          default: 300
        search_limit_max:
          type: integer
          title: Search Limit Max
          description: Максимальный лимит поиска
          default: 20
        context_max_tokens:
          type: integer
          title: Context Max Tokens
          description: Максимум токенов в контексте
          default: 8000
      type: object
      title: AdminConfigResponse
      description: RAG-конфиг для админ-панели (embedding_api_key маскируется).
    AdminConfigUpdateRequest:
      properties:
        embedding_provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Provider
        embedding_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Model
        embedding_batch_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Embedding Batch Size
        embedding_device:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Device
        embedding_local_files_only:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Embedding Local Files Only
        embedding_query_prefix:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Query Prefix
        embedding_passage_prefix:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Passage Prefix
        embedding_api_base:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Api Base
        embedding_dimensions:
          anyOf:
          - type: integer
          - type: 'null'
          title: Embedding Dimensions
        chunker_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Chunker Type
        chunk_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Chunk Size
        chunk_overlap:
          anyOf:
          - type: integer
          - type: 'null'
          title: Chunk Overlap
        page_overlap_tokens:
          anyOf:
          - type: integer
          - type: 'null'
          title: Page Overlap Tokens
        chroma_collection:
          anyOf:
          - type: string
          - type: 'null'
          title: Chroma Collection
        rag_instruction:
          anyOf:
          - type: string
          - type: 'null'
          title: Rag Instruction
        reranker_enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Reranker Enabled
        reranker_k1:
          anyOf:
          - type: number
          - type: 'null'
          title: Reranker K1
        reranker_b:
          anyOf:
          - type: number
          - type: 'null'
          title: Reranker B
        reranker_dense_factor:
          anyOf:
          - type: integer
          - type: 'null'
          title: Reranker Dense Factor
        cache_enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Cache Enabled
        cache_maxsize:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cache Maxsize
        cache_ttl:
          anyOf:
          - type: integer
          - type: 'null'
          title: Cache Ttl
        search_limit_max:
          anyOf:
          - type: integer
          - type: 'null'
          title: Search Limit Max
        context_max_tokens:
          anyOf:
          - type: integer
          - type: 'null'
          title: Context Max Tokens
      type: object
      title: AdminConfigUpdateRequest
      description: Обновление RAG-конфига (все поля опциональны, api_key не принимается).
    AdminStatsResponse:
      properties:
        document_count:
          type: integer
          title: Document Count
          description: Количество документов в индексе
        chunk_count:
          type: integer
          title: Chunk Count
          description: Количество чанков в индексе
        chroma_size_mb:
          type: number
          title: Chroma Size Mb
          description: Размер хранилища ChromaDB в мегабайтах
      type: object
      required:
      - document_count
      - chunk_count
      - chroma_size_mb
      title: AdminStatsResponse
      description: Статистика RAG-сервиса.
    Body_upload_document_documents_upload_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
          description: Файл документа (PDF, DOCX, TXT, MD, HTML)
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          description: Человекочитаемое название
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
          description: ID дисциплины для привязки
        discipline_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Name
          description: Название дисциплины
      type: object
      required:
      - file
      title: Body_upload_document_documents_upload_post
    ContextRequest:
      properties:
        query:
          type: string
          minLength: 1
          title: Query
          description: Вопрос пользователя
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
          description: ID дисциплины для фильтрации
        limit:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Limit
          description: Фрагментов в контексте (1–20)
          default: 5
      type: object
      required:
      - query
      title: ContextRequest
      description: Запрос готового RAG-контекста для LLM.
    ContextResponse:
      properties:
        context:
          type: string
          title: Context
          description: Объединённый текст релевантных фрагментов
        sources:
          items:
            $ref: '#/components/schemas/RagSearchResult'
          type: array
          title: Sources
          description: Список источников, использованных в контексте
      type: object
      required:
      - context
      - sources
      title: ContextResponse
      description: Сформированный контекст для LLM.
    DeleteDocumentRequest:
      properties:
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
          description: Путь к файлу документа
        document_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Document Id
          description: ID документа
      type: object
      title: DeleteDocumentRequest
      description: Запрос удаления документа.
    DeleteDocumentResponse:
      properties:
        deleted:
          anyOf:
          - type: string
          - type: 'null'
          title: Deleted
          description: ID удалённого документа
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          description: Название удалённого документа
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
          description: Сообщение о результате (например, если документ не найден)
      type: object
      title: DeleteDocumentResponse
      description: Результат удаления документа.
    Document:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        source_path:
          type: string
          title: Source Path
        mime_type:
          type: string
          title: Mime Type
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
        discipline_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Name
        created_at:
          type: string
          title: Created At
      type: object
      required:
      - id
      - title
      - source_path
      - mime_type
      - created_at
      title: Document
      description: Документ, загруженный в RAG-индекс.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
          title: Status
          default: ok
        database:
          additionalProperties: true
          type: object
          title: Database
          description: Статус SQLite-доступа
        chroma:
          additionalProperties: true
          type: object
          title: Chroma
          description: Статус ChromaDB-индекса
        embedding:
          additionalProperties: true
          type: object
          title: Embedding
          description: Статус embedding-модели
      type: object
      title: HealthResponse
      description: Состояние RAG-сервиса и его зависимостей.
    ImportDocumentRequest:
      properties:
        path:
          type: string
          minLength: 1
          title: Path
          description: Путь к файлу (PDF, DOCX, TXT, MD, HTML)
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
          description: ID дисциплины для привязки
        discipline_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Name
          description: Название дисциплины (сохраняется при импорте)
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          description: Человекочитаемое название
      type: object
      required:
      - path
      title: ImportDocumentRequest
      description: Запрос импорта документа.
    ImportDocumentResponse:
      properties:
        document:
          $ref: '#/components/schemas/Document'
          description: Метаданные импортированного документа
        chunks_count:
          type: integer
          title: Chunks Count
          description: Количество созданных чанков
      type: object
      required:
      - document
      - chunks_count
      title: ImportDocumentResponse
      description: Результат импорта документа.
    ListDocumentsRequest:
      properties:
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
          description: ID дисциплины для фильтрации
        limit:
          anyOf:
          - type: integer
            maximum: 1000.0
            minimum: 1.0
          - type: 'null'
          title: Limit
          description: Максимум документов (1–1000)
      type: object
      title: ListDocumentsRequest
      description: Запрос списка документов.
    ListDocumentsResponse:
      properties:
        documents:
          items:
            $ref: '#/components/schemas/Document'
          type: array
          title: Documents
          description: Список документов в индексе
        count:
          type: integer
          title: Count
          description: Общее количество найденных документов
      type: object
      required:
      - documents
      - count
      title: ListDocumentsResponse
      description: Список документов в индексе.
    RagSearchResult:
      properties:
        document_id:
          type: string
          title: Document Id
        document_title:
          type: string
          title: Document Title
        source_path:
          type: string
          title: Source Path
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
        chunk_id:
          type: string
          title: Chunk Id
        chunk_index:
          type: integer
          title: Chunk Index
        page:
          anyOf:
          - type: integer
          - type: 'null'
          title: Page
        score:
          type: number
          title: Score
        content:
          type: string
          title: Content
      type: object
      required:
      - document_id
      - document_title
      - source_path
      - chunk_id
      - chunk_index
      - score
      - content
      title: RagSearchResult
      description: Результат семантического поиска по документам.
    SearchRequest:
      properties:
        query:
          type: string
          minLength: 1
          title: Query
          description: Поисковый запрос
        discipline_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Discipline Id
          description: ID дисциплины для фильтрации
        limit:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Limit
          description: Количество результатов (1–20)
          default: 5
      type: object
      required:
      - query
      title: SearchRequest
      description: Запрос семантического поиска.
    SearchResponse:
      properties:
        results:
          items:
            $ref: '#/components/schemas/RagSearchResult'
          type: array
          title: Results
          description: Список найденных фрагментов
        count:
          type: integer
          title: Count
          description: Общее количество результатов
      type: object
      required:
      - results
      - count
      title: SearchResponse
      description: Результаты семантического поиска.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
